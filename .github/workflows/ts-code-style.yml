name: TS Code Style

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - 'src/**/*.js'
      - 'src/**/*.jsx'
      - 'examples/**/*.ts'
      - 'examples/**/*.tsx'
      - 'examples/**/*.js'
      - 'examples/**/*.jsx'
      - '.eslintrc*'
      - '.prettierrc*'
      - 'package.json'
      - '.github/workflows/ts-code-style.yml'
      - '.github/workflows/reusable-typescript.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - 'src/**/*.js'
      - 'src/**/*.jsx'
      - 'examples/**/*.ts'
      - 'examples/**/*.tsx'
      - 'examples/**/*.js'
      - 'examples/**/*.jsx'
      - '.eslintrc*'
      - '.prettierrc*'
      - 'package.json'
      - '.github/workflows/ts-code-style.yml'
      - '.github/workflows/reusable-typescript.yml'

jobs:
  code-style:
    uses: ./.github/workflows/reusable-typescript.yml
    with:
      node-version: '22'
      install-command: 'npm install'
      build-command: ''  # Skip build for code style checks
      run-format-check: true
      run-lint: true
      run-type-check: false
      run-tests: false

  auto-fix:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: code-style
    continue-on-error: true

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js 22
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: |
        set -euo pipefail
        npm config set fetch-retries 5
        npm config set fetch-retry-factor 2
        npm config set fetch-retry-mintimeout 20000
        npm config set fetch-retry-maxtimeout 120000
        npm config set prefer-online true
        for attempt in 1 2 3; do
          echo "Install attempt ${attempt}/3: npm install"
          if npm install; then
            exit 0
          fi
          if [[ "$attempt" -lt 3 ]]; then
            sleep_seconds=$((attempt * 20))
            echo "Install failed; retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          fi
        done
        echo "Dependency installation failed after 3 attempts"
        exit 1

    - name: Auto-fix formatting issues
      run: |
        npm run format:fix
        npm run format:fix:all

    - name: Auto-fix linting issues
      run: |
        npm run lint:fix
        npm run lint:fix:all

    - name: Check for uncommitted changes
      run: |
        if [[ -n $(git status --porcelain) ]]; then
          echo "::warning::Code style issues found that can be auto-fixed"
          echo "Run 'npm run check:fix' locally to fix these issues"
          git diff --name-only
        fi